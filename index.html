    <H1>Função de Soma de dois Numeros em JavaScritp</H1>
    <script>
        function somar() {

            let valor1;
            let valor2;
            let soma;

            valor1 = Number(prompt('Digite o Primeiro Numero'));
            valor2 = Number(prompt('Digite o Segundo Numero'));

            soma = valor1 + valor2;

            alert(soma);

        }
    </script>

    <button onclick="somar()">Somar Numeros por funçãor</button>
